<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Kevin 能力樹與人力架構地圖</title>
  <desc id="desc">中心是社福科技產品與營運架構師，外圍分成產品與工具、營運與資料、知識與夥伴三大層。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17232e" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1120" height="560" fill="#ffffff"/>
  <rect x="38" y="42" width="1044" height="476" rx="20" fill="#f4f7f8" stroke="#d9dee3"/>
  <circle cx="560" cy="280" r="106" fill="#202326" filter="url(#shadow)"/>
  <text x="560" y="252" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">社福科技產品</text>
  <text x="560" y="286" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">與營運架構師</text>
  <text x="560" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#cfd6dc">Kevin core role</text>

  <g font-family="Microsoft JhengHei, Arial, sans-serif" font-size="17" font-weight="700">
    <rect x="88" y="92" width="250" height="86" rx="12" fill="#e8f7f6" stroke="#0f7b7b"/>
    <text x="213" y="126" text-anchor="middle" fill="#0f5959">社工可用工具</text>
    <text x="213" y="154" text-anchor="middle" font-size="14" font-weight="400" fill="#41505c">風險辨識 / 個案紀錄 / 資源連結</text>

    <rect x="88" y="378" width="250" height="86" rx="12" fill="#fff2ef" stroke="#bf5145"/>
    <text x="213" y="412" text-anchor="middle" fill="#91352d">民眾生活財務工具</text>
    <text x="213" y="440" text-anchor="middle" font-size="14" font-weight="400" fill="#41505c">健檢 / 快篩 / 知識庫 / AI 問答</text>

    <rect x="435" y="62" width="250" height="86" rx="12" fill="#f2f0f8" stroke="#77558a"/>
    <text x="560" y="96" text-anchor="middle" fill="#5a3f69">專案規劃</text>
    <text x="560" y="124" text-anchor="middle" font-size="14" font-weight="400" fill="#41505c">階段 / 任務 / 驗收 / 風險</text>

    <rect x="435" y="412" width="250" height="86" rx="12" fill="#eef5eb" stroke="#4b7d3b"/>
    <text x="560" y="446" text-anchor="middle" fill="#345f29">夥伴帶領</text>
    <text x="560" y="474" text-anchor="middle" font-size="14" font-weight="400" fill="#41505c">SOP / 回報 / demo / 審核</text>

    <rect x="782" y="92" width="250" height="86" rx="12" fill="#edf4fc" stroke="#2d68a6"/>
    <text x="907" y="126" text-anchor="middle" fill="#244f7b">報表與成效</text>
    <text x="907" y="154" text-anchor="middle" font-size="14" font-weight="400" fill="#41505c">KPI / 漏斗 / 廣告 / 異常</text>

    <rect x="782" y="378" width="250" height="86" rx="12" fill="#fff7e6" stroke="#9a6a00"/>
    <text x="907" y="412" text-anchor="middle" fill="#745000">新知技能活用</text>
    <text x="907" y="440" text-anchor="middle" font-size="14" font-weight="400" fill="#41505c">AI / 社福 / 財務 / 產品方法</text>
  </g>

  <g stroke="#8b98a5" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M338 135 C420 150 455 200 480 230"/>
    <path d="M338 421 C420 410 455 360 480 330"/>
    <path d="M560 148 C560 178 560 196 560 210"/>
    <path d="M560 412 C560 382 560 364 560 350"/>
    <path d="M782 135 C700 150 665 200 640 230"/>
    <path d="M782 421 C700 410 665 360 640 330"/>
  </g>

  <g font-family="Microsoft JhengHei, Arial, sans-serif" font-size="14" fill="#5e6670">
    <text x="74" y="504">第一版公開盤點：高階結構，不含內部帳號、信件、個資或薪資明細。</text>
