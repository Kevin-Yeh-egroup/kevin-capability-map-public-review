<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Kevin weekly capability dashboard v1.2</title>
  <desc id="desc">A public-safe dashboard showing changed work lines, delegation candidates, blockers, and next-week actions.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#1B2A32" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #F7FAF8; }
      .title { font: 700 34px Arial, sans-serif; fill: #12343B; }
      .sub { font: 400 16px Arial, sans-serif; fill: #4B5B60; }
      .card { filter: url(#shadow); }
      .metric { font: 800 42px Arial, sans-serif; fill: #12343B; }
      .metricLabel { font: 700 14px Arial, sans-serif; fill: #486167; }
      .sectionTitle { font: 700 20px Arial, sans-serif; fill: #12343B; }
      .small { font: 400 14px Arial, sans-serif; fill: #2F4247; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #5B6D71; }
      .badge { font: 700 12px Arial, sans-serif; fill: #FFFFFF; }
      .footer { font: 400 13px Arial, sans-serif; fill: #647275; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="60" y="58">Weekly Capability Dashboard v1.2</text>
  <text class="sub" x="60" y="88">Decision view for changed work lines, delegation, blockers, and next-week actions.</text>

  <g class="card">
    <rect x="60" y="126" width="150" height="110" rx="16" fill="#DCEFE8"/>
    <text class="metric" x="135" y="178" text-anchor="middle">7</text>
    <text class="metricLabel" x="135" y="208" text-anchor="middle">capability nodes</text>
  </g>
  <g class="card">
    <rect x="230" y="126" width="150" height="110" rx="16" fill="#E7EBFF"/>
    <text class="metric" x="305" y="178" text-anchor="middle">8</text>
    <text class="metricLabel" x="305" y="208" text-anchor="middle">work lines</text>
  </g>
  <g class="card">
    <rect x="400" y="126" width="150" height="110" rx="16" fill="#FFF1D6"/>
    <text class="metric" x="475" y="178" text-anchor="middle">3</text>
    <text class="metricLabel" x="475" y="208" text-anchor="middle">partner-ready</text>
  </g>
  <g class="card">
    <rect x="570" y="126" width="150" height="110" rx="16" fill="#E0F2FE"/>
    <text class="metric" x="645" y="178" text-anchor="middle">8</text>
    <text class="metricLabel" x="645" y="208" text-anchor="middle">Codex-ready</text>
  </g>
  <g class="card">
    <rect x="740" y="126" width="150" height="110" rx="16" fill="#F4E8FF"/>
    <text class="metric" x="815" y="178" text-anchor="middle">4</text>
    <text class="metricLabel" x="815" y="208" text-anchor="middle">automation candidates</text>
  </g>
  <g class="card">
    <rect x="910" y="126" width="170" height="110" rx="16" fill="#FFE4E6"/>
    <text class="metric" x="995" y="178" text-anchor="middle">4</text>
    <text class="metricLabel" x="995" y="208" text-anchor="middle">private-only blockers</text>
  </g>

  <g class="card">
    <rect x="60" y="282" width="330" height="178" rx="18" fill="#FFFFFF"/>
    <rect x="84" y="306" width="104" height="24" rx="12" fill="#0F766E"/>
    <text class="badge" x="136" y="323" text-anchor="middle">Changed</text>
    <text class="sectionTitle" x="84" y="360">Changed work lines</text>
    <text class="small" x="84" y="392">AI / Codex ops → dashboard view</text>
    <text class="small" x="84" y="418">Project leadership → delegation split</text>
    <text class="small" x="84" y="444">Governance → private-only blockers visible</text>
  </g>

  <g class="card">
    <rect x="430" y="282" width="330" height="178" rx="18" fill="#FFFFFF"/>
    <rect x="454" y="306" width="108" height="24" rx="12" fill="#0369A1"/>
    <text class="badge" x="508" y="323" text-anchor="middle">Delegate</text>
    <text class="sectionTitle" x="454" y="360">Delegation snapshot</text>
    <text class="small" x="454" y="392">Kevin: direction and approval</text>
    <text class="small" x="454" y="418">Partner: public source and checklist work</text>
    <text class="small" x="454" y="444">Codex: draft, package, verify</text>
  </g>

  <g class="card">
    <rect x="800" y="282" width="330" height="178" rx="18" fill="#FFFFFF"/>
    <rect x="824" y="306" width="106" height="24" rx="12" fill="#BE123C"/>
    <text class="badge" x="877" y="323" text-anchor="middle">Blocked</text>
    <text class="sectionTitle" x="824" y="360">Private-only blockers</text>
    <text class="small" x="824" y="392">Real workforce import</text>
    <text class="small" x="824" y="418">Real candidate records</text>
    <text class="small" x="824" y="444">Trial sends and de-identified exports</text>
  </g>

  <g class="card">
    <rect x="60" y="508" width="1070" height="150" rx="18" fill="#12343B"/>
    <text class="sectionTitle" x="88" y="548" fill="#FFFFFF" style="fill:#FFFFFF">Next-week candidates</text>
    <text class="small" x="88" y="586" fill="#FFFFFF" style="fill:#FFFFFF">1. Social-worker tools line card</text>
    <text class="small" x="390" y="586" fill="#FFFFFF" style="fill:#FFFFFF">2. Citizen finance-life roadmap</text>
    <text class="small" x="735" y="586" fill="#FFFFFF" style="fill:#FFFFFF">3. Private workforce import checklist</text>
    <text class="tiny" x="88" y="626" fill="#DDEBE8" style="fill:#DDEBE8">Dashboard remains public-safe: no real candidate data, no private messages, no compensation amounts, no local paths.</text>
  </g>

  <text class="footer" x="60" y="716">v1.2 dashboard · noindex review build · public planning layer only · private work requires Kevin approval</text>
</svg>
