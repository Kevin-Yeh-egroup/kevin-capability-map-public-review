<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">Kevin weekly capability map v1.1</title>
  <desc id="desc">A public-safe weekly capability map showing Kevin's work lines, current specs, future outlook, and owner split.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1B2A32" flood-opacity="0.18"/>
    </filter>
    <style>
      .bg { fill: #F7FAF8; }
      .title { font: 700 34px Arial, sans-serif; fill: #12343B; }
      .sub { font: 400 17px Arial, sans-serif; fill: #4B5B60; }
      .center { fill: #12343B; filter: url(#shadow); }
      .centerText { font: 700 25px Arial, sans-serif; fill: #FFFFFF; }
      .centerSub { font: 400 15px Arial, sans-serif; fill: #DDEBE8; }
      .node { filter: url(#shadow); }
      .nodeTitle { font: 700 18px Arial, sans-serif; fill: #142326; }
      .nodeText { font: 400 13px Arial, sans-serif; fill: #2F4247; }
      .line { stroke: #8AA5A0; stroke-width: 2.5; fill: none; opacity: 0.78; }
      .badge { font: 700 13px Arial, sans-serif; fill: #FFFFFF; }
      .footer { font: 400 13px Arial, sans-serif; fill: #647275; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="780" rx="0"/>
  <text class="title" x="60" y="58">Weekly Capability Map v1.1</text>
  <text class="sub" x="60" y="88">Public-safe baseline for needs, current specs, future outlook, and division of work.</text>

  <path class="line" d="M600 205 C520 185 430 165 322 152"/>
  <path class="line" d="M600 205 C695 174 790 151 900 142"/>
  <path class="line" d="M600 290 C480 292 380 310 254 356"/>
  <path class="line" d="M600 290 C730 298 835 330 960 368"/>
  <path class="line" d="M600 372 C500 440 420 510 322 608"/>
  <path class="line" d="M600 372 C710 438 812 514 900 612"/>
  <path class="line" d="M600 402 C600 500 600 580 600 652"/>

  <rect class="center" x="438" y="194" width="324" height="208" rx="28"/>
  <text class="centerText" x="600" y="248" text-anchor="middle">Kevin Operating System</text>
  <text class="centerSub" x="600" y="282" text-anchor="middle">需求 → 規格 → 產物 → 分工 → 週更新</text>
  <text class="centerSub" x="600" y="314" text-anchor="middle">Public-safe explanation layer</text>
  <text class="centerSub" x="600" y="346" text-anchor="middle">Private work stays behind approval gates</text>

  <g class="node">
    <rect x="74" y="112" width="296" height="112" rx="16" fill="#DCEFE8"/>
    <rect x="94" y="132" width="72" height="24" rx="12" fill="#0F766E"/>
    <text class="badge" x="130" y="149" text-anchor="middle">AI</text>
    <text class="nodeTitle" x="94" y="181">AI / Codex 作業系統</text>
    <text class="nodeText" x="94" y="204">routing, scanners, validators, builders</text>
  </g>

  <g class="node">
    <rect x="830" y="104" width="300" height="124" rx="16" fill="#E7EBFF"/>
    <rect x="850" y="124" width="86" height="24" rx="12" fill="#4F46E5"/>
    <text class="badge" x="893" y="141" text-anchor="middle">社福科技</text>
    <text class="nodeTitle" x="850" y="175">社工 / 民眾工具</text>
    <text class="nodeText" x="850" y="198">resource, forms, service flows, guidance</text>
  </g>

  <g class="node">
    <rect x="70" y="306" width="322" height="130" rx="16" fill="#FFF1D6"/>
    <rect x="92" y="326" width="96" height="24" rx="12" fill="#B7791F"/>
    <text class="badge" x="140" y="343" text-anchor="middle">研究內容</text>
    <text class="nodeTitle" x="92" y="378">知識蒐集與活用</text>
    <text class="nodeText" x="92" y="402">source table → brief → checklist</text>
  </g>

  <g class="node">
    <rect x="824" y="314" width="322" height="132" rx="16" fill="#FFE4E6"/>
    <rect x="846" y="334" width="96" height="24" rx="12" fill="#BE123C"/>
    <text class="badge" x="894" y="351" text-anchor="middle">人力架構</text>
    <text class="nodeTitle" x="846" y="386">人力情報站 / HR 評估</text>
    <text class="nodeText" x="846" y="410">schema, pilots, trial, feedback, supervision</text>
  </g>

  <g class="node">
    <rect x="80" y="570" width="318" height="122" rx="16" fill="#E0F2FE"/>
    <rect x="102" y="590" width="92" height="24" rx="12" fill="#0369A1"/>
    <text class="badge" x="148" y="607" text-anchor="middle">帶人</text>
    <text class="nodeTitle" x="102" y="642">專案規劃與夥伴帶領</text>
    <text class="nodeText" x="102" y="666">work packages, gates, handoff ladder</text>
  </g>

  <g class="node">
    <rect x="816" y="574" width="328" height="122" rx="16" fill="#E9F8D9"/>
    <rect x="838" y="594" width="102" height="24" rx="12" fill="#3F7D20"/>
    <text class="badge" x="889" y="611" text-anchor="middle">發布治理</text>
    <text class="nodeTitle" x="838" y="646">GitHub / Vercel / noindex</text>
    <text class="nodeText" x="838" y="670">public proof, redaction scan, approval gates</text>
  </g>

  <g class="node">
    <rect x="446" y="616" width="308" height="96" rx="16" fill="#F4E8FF"/>
    <rect x="468" y="636" width="92" height="24" rx="12" fill="#7E22CE"/>
    <text class="badge" x="514" y="653" text-anchor="middle">週更新</text>
    <text class="nodeTitle" x="468" y="684">每週能力地圖 refresh</text>
    <text class="nodeText" x="468" y="706">changed lines, no-op, next-week candidates</text>
  </g>

  <text class="footer" x="60" y="744">v1.1 baseline · public review · no real candidate records · no private messages · noindex is search control, not privacy</text>
</svg>
